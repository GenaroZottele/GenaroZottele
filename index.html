<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/css/bootstrap.min.css">
    <title>Document</title>
</head>
<body>

    <form class="w-50 mx-auto" id="formulario">

        <div class="form-group"> <!-- Full Name -->
            <label for="full_name_id" class="control-label p-3 fw-semibold">Nombre Completo</label>
            <input type="text" class="form-control" id="idNombre" name="full_name" placeholder="Nombre y Apellido">
        </div>    
    
        <div class="form-group"> <!-- Street 1 -->
            <label for="street1_id" class="control-label p-3 fw-semibold">Direccion</label>
            <input type="text" class="form-control" id="idCalle" name="street1" placeholder="Calle">
        </div>                    
        
        <div class="form-group"> <!-- City-->
            <label for="city_id" class="control-label p-3 fw-semibold">Ciudad</label>
            <input type="text" class="form-control" id="idCiudad" name="city" placeholder="Ciudad">
        </div>                                    
                                
        <div class="form-group"> <!-- State Button -->
            <label for="state_id" class="control-label p-3 fw-semibold">Provincia</label>
            <select class="form-control" id="idProvincia">
                <option value="BA">Buenos Aires</option>
                <option value="CA">Catamarca</option> 
                <option value="CH">Chaco</option>
                <option value="CT">Chubut</option>
                <option value="CB">Cordoba</option>
                <option value="CR">Corrientes</option>
                <option value="ER">Entre Rios</option>
                <option value="FO">Formosa</option>
                <option value="JY">Jujuy</option>
                <option value="LP">La Pampa</option>
                <option value="LR">La Rioja</option>
                <option value="MZ">Mendoza</option>
                <option value="MI">Misiones</option>
                <option value="NQN">Neuquen</option>
                <option value="RN">Rio Negro</option>
                <option value="SA">Salta</option>
                <option value="SJ">San Juan</option>
                <option value="SL">San Luis</option>
                <option value="SC">Santa Cruz</option>
                <option value="SF">Santa Fe</option>
                <option value="SE">Santiago del Estero</option>
                <option value="TF">Tierra del Fuego</option>
                <option value="TU">Tucuman</option>
            </select>                    
        </div>
        
        <div class="form-group"> <!-- Zip Code-->
            <label for="zip_id" class="control-label p-3 fw-semibold">Codigo Postal</label>
            <input type="text" class="form-control" id="idPostal" name="zip" placeholder="#####">
        </div>        
        
        <div class="form-group my-3"> <!-- Submit Button -->
            <button type="submit" class="btn btn-primary p-3 fw-semibold" id="btnPrincipal">Enviar</button>
        </div>     

        <div class="form-group my-3"> <!-- Submit Button -->
            <button type="submit" class="btn btn-primary p-3 fw-semibold" id="btnLimpiar">Limpiar</button>
        </div>
        
    </form>

    <h1>Datos</h1>
    <div class="col-md-6">
        <table id="tablaProductos" class="table table-striped table-hover">
            <thead>
                <tr>
                    <td>Nombre</td>
                    <td>Calle</td>
                    <td>Ciudad</td>
                    <td>Provincia</td>
                    <td>Codigo Postal</td>
                </tr>
            </th>
                
            <tbody class="tabla">
                    
            </tbody>
                
        </table>
    </div>

    <Script src="js_practica.js"></Script>
</body>
</html>
